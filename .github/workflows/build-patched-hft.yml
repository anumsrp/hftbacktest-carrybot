name: build-patched-hftbacktest

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python: ["3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.91.1
      - name: Verify immutable upstream and apply controlled patch
        shell: bash
        run: |
          test "$(git -C upstream rev-parse HEAD)" = "a244a14250b42d97fc305569c93c4117cd5e1dff"
          python - <<'PY'
          from pathlib import Path
          replacements = {
              "upstream/hftbacktest/src/backtest/proc/local.rs": ("if order.status == Status::Filled {", "if order.status == Status::Filled || order.status == Status::PartiallyFilled {"),
              "upstream/hftbacktest/src/backtest/proc/l3_local.rs": ("if order.status == Status::Filled {", "if order.status == Status::Filled || order.status == Status::PartiallyFilled {"),
              "upstream/py-hftbacktest/pyproject.toml": ('version = "2.4.4"', 'version = "2.4.4+carrybot.partialfill1"'),
              "upstream/py-hftbacktest/Cargo.toml": ('version = "2.4.4"', 'version = "2.4.4+carrybot.partialfill1"'),
              "upstream/py-hftbacktest/hftbacktest/__init__.py": ("__version__ = '2.4.4'", "__version__ = '2.4.4+carrybot.partialfill1'"),
          }
          for name, (old, new) in replacements.items():
              path = Path(name); text = path.read_text(encoding="utf-8"); count = text.count(old)
              print(f"{name}: target_count={count}")
              if count != 1: raise SystemExit(f"{name}: expected exactly one patch target, got {count}")
              path.write_text(text.replace(old, new), encoding="utf-8")
          PY
          git -C upstream diff --check
          git -C upstream diff -- hftbacktest/src/backtest/proc/local.rs hftbacktest/src/backtest/proc/l3_local.rs py-hftbacktest/pyproject.toml py-hftbacktest/Cargo.toml py-hftbacktest/hftbacktest/__init__.py > applied.patch
          sha256sum applied.patch
      - name: Build wheel
        shell: bash
        run: |
          set -o pipefail
          python -m pip install --upgrade pip
          python -m pip wheel ./upstream/py-hftbacktest --no-deps --wheel-dir wheelhouse 2>&1 | tee build.log
      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostic-${{ runner.os }}-py${{ matrix.python }}
          path: |
            build.log
            applied.patch
          if-no-files-found: warn
      - name: Install and verify identity
        shell: bash
        run: |
          python -m pip install wheelhouse/hftbacktest-*.whl "numpy>=2,<2.3" "pytest>=8,<10"
          python -c "import importlib.metadata as m, hftbacktest as h; assert m.version('hftbacktest') == '2.4.4+carrybot.partialfill1'; assert h.__version__ == '2.4.4+carrybot.partialfill1'"
      - name: Real-engine regression tests
        shell: bash
        run: python -m pytest -q tests/test_partial_fill_accounting.py
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ runner.os }}-py${{ matrix.python }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  publish-wheels:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: py-v2.4.4-carrybot-partialfill1
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: dist-staging
          merge-multiple: true
      - name: Commit immutable wheel set
        shell: bash
        run: |
          mkdir -p dist
          cp dist-staging/*.whl dist/
          sha256sum dist/*.whl > dist/SHA256SUMS
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist
          git commit -m "Build patched hftbacktest wheels [skip ci]"
          git push origin HEAD:py-v2.4.4-carrybot-partialfill1
