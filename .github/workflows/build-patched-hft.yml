name: build-patched-hftbacktest

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.91.1
      - name: Verify immutable upstream and apply exact patch
        shell: bash
        run: |
          test "$(git -C upstream rev-parse HEAD)" = "a244a14250b42d97fc305569c93c4117cd5e1dff"
          cd upstream
          git apply --check ../patches/carrybot-partialfill1.patch
          git apply ../patches/carrybot-partialfill1.patch
          git diff --check
      - name: Build wheel
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip wheel ./upstream --no-deps --wheel-dir wheelhouse
      - name: Install and verify identity
        shell: bash
        run: |
          python -m pip install wheelhouse/hftbacktest-*.whl "numpy>=2,<2.3" "pytest>=8,<10"
          python -c "import importlib.metadata as m; assert m.version('hftbacktest') == '2.4.4+carrybot.partialfill1'"
      - name: Real-engine regression tests
        shell: bash
        run: python -m pytest -q tests/test_partial_fill_accounting.py
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ runner.os }}-py${{ matrix.python }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  publish-wheels:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: py-v2.4.4-carrybot-partialfill1
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: dist-staging
          merge-multiple: true
      - name: Commit immutable wheel set
        shell: bash
        run: |
          mkdir -p dist
          cp dist-staging/*.whl dist/
          sha256sum dist/*.whl > dist/SHA256SUMS
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist
          git commit -m "Build patched hftbacktest wheels [skip ci]"
          git push origin HEAD:py-v2.4.4-carrybot-partialfill1
