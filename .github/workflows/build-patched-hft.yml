name: build-patched-hftbacktest

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-py313-artifact:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.1
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: upstream-src -> target
          key: hftbacktest-linux-py313-a244a142
      - name: Fetch immutable upstream
        shell: bash
        run: |
          git clone --filter=blob:none https://github.com/nkaz001/hftbacktest.git upstream-src
          git -C upstream-src checkout --detach a244a14250b42d97fc305569c93c4117cd5e1dff
          test "$(git -C upstream-src rev-parse HEAD)" = "a244a14250b42d97fc305569c93c4117cd5e1dff"
      - name: Apply controlled patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          replacements = {
              "upstream-src/hftbacktest/src/backtest/proc/local.rs": ("if order.status == Status::Filled {", "if order.status == Status::Filled || order.status == Status::PartiallyFilled {"),
              "upstream-src/hftbacktest/src/backtest/proc/l3_local.rs": ("if order.status == Status::Filled {", "if order.status == Status::Filled || order.status == Status::PartiallyFilled {"),
              "upstream-src/py-hftbacktest/pyproject.toml": ('version = "2.4.4"', 'version = "2.4.4+carrybot.partialfill1"'),
              "upstream-src/py-hftbacktest/Cargo.toml": ('version = "2.4.4"', 'version = "2.4.4+carrybot.partialfill1"'),
              "upstream-src/py-hftbacktest/hftbacktest/__init__.py": ("__version__ = '2.4.4'", "__version__ = '2.4.4+carrybot.partialfill1'"),
          }
          for name, (old, new) in replacements.items():
              path = Path(name)
              text = path.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{name}: expected exactly one patch target, got {count}")
              path.write_text(text.replace(old, new), encoding="utf-8")
          PY
          git -C upstream-src diff --check
          git -C upstream-src diff -- hftbacktest/src/backtest/proc/local.rs hftbacktest/src/backtest/proc/l3_local.rs py-hftbacktest/pyproject.toml py-hftbacktest/Cargo.toml py-hftbacktest/hftbacktest/__init__.py > applied.patch
          sha256sum applied.patch
      - name: Build patched native wheel
        shell: bash
        run: |
          set -o pipefail
          python -m pip install --upgrade pip
          python -m pip wheel ./upstream-src/py-hftbacktest --no-deps --wheel-dir wheelhouse 2>&1 | tee build.log
      - name: Upload Python 3.13 wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-Linux-py3.13-final
          path: wheelhouse/*.whl
          if-no-files-found: error
      - name: Install and verify package identity
        shell: bash
        run: |
          python -m pip install wheelhouse/hftbacktest-*.whl "numpy>=2,<2.3" "pytest>=8,<10"
          python -c "import importlib.metadata as m, hftbacktest as h; assert m.version('hftbacktest') == '2.4.4+carrybot.partialfill1'; assert h.__version__ == '2.4.4+carrybot.partialfill1'"
      - name: Run real-engine regression tests
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -vv tests/test_partial_fill_accounting.py 2>&1 | tee pytest.log
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostic-Linux-py3.13-final
          path: |
            build.log
            pytest.log
            applied.patch
          if-no-files-found: warn
